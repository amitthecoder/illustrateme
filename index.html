<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illustrate Me</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            color: #333;
        }

        header {
            background-color: #4285f4;
            color: white;
            text-align: center;
            padding: 1em;
            margin-bottom: 20px;
        }

        section {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #4285f4;
        }

        p {
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background-color: #34a853;
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2d8a73;
        }
    </style>
</head>
<body>

    <header>
        <h1>Purchase Illustrate Me Domain</h1>
    </header>

    <section>
        <h2>Domain Information</h2>
        <p><strong>illustrateme.in</strong> - A premium domain perfect for your business or project.</p>
    </section>

    <section>
        <h2>Pricing</h2>
        <p>Asking Price: <strong>$2,000</strong></p>
        <p>Contact us for negotiation and payment details.</p>
    </section>

    <section>
        <h2>Contact Us</h2>
        <form action="#" method="post">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">Submit Inquiry</button>
        </form>
    </section>

</body>
</html>
